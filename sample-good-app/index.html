<!doctype html>
<html><head><meta charset="utf-8"><title>LaunchCheck sample app ready</title><style>
body{font-family:Segoe UI,Arial,sans-serif;background:#10141c;color:#f4f7fb;margin:0;padding:32px}.panel{max-width:760px;margin:auto;background:#18202c;border:1px solid #2b3748;border-radius:16px;padding:24px}button{margin:6px;padding:10px 14px;border-radius:10px;border:1px solid #62708a;background:#263247;color:#fff;cursor:pointer}#statusPanel{display:none;margin-top:18px;padding:16px;background:#0f1520;border-radius:12px}.visible{display:block!important}textarea{width:100%;height:90px;margin-top:10px;background:#0b1018;color:#dff;border:1px solid #344156;border-radius:8px}
</style></head><body><main class="panel"><h1>LaunchCheck sample app ready</h1><p>This sample exists so LaunchCheck can prove browser validation, controls, screenshots, and state continuity.</p><button id="openStatus" onclick="openStatusPanel()">Open status panel</button><button id="exportBtn" onclick="copyExportState()">Export state</button><button id="importBtn" onclick="importFromBox()">Import state</button><section id="statusPanel"><strong id="statusText">Status panel ready</strong><textarea id="stateBox">{"open":true,"message":"Export OK"}</textarea><p id="message">Waiting</p></section></main><script>
function getDefaultState(){return {open:false,message:'Default'};}
function validateState(state){return !!state && typeof state === 'object' && typeof state.open === 'boolean' && typeof state.message === 'string';}
function migrateState(oldState){const base=getDefaultState(); return Object.assign(base, oldState || {});}
function exportState(){return {open:document.getElementById('statusPanel').classList.contains('visible'),message:document.getElementById('message').textContent || 'Export OK'};}
function importState(state){state=migrateState(state); if(!validateState(state)) throw new Error('Invalid state'); document.getElementById('statusPanel').classList.toggle('visible',!!state.open); document.getElementById('message').textContent=state.message || 'Import OK'; document.getElementById('stateBox').value=JSON.stringify(exportState()); return true;}
function openStatusPanel(){document.getElementById('statusPanel').classList.add('visible'); document.getElementById('message').textContent='Status panel open'; document.getElementById('stateBox').value=JSON.stringify(exportState());}
function copyExportState(){openStatusPanel(); document.getElementById('message').textContent='Export OK'; document.getElementById('stateBox').value=JSON.stringify(exportState());}
function importFromBox(){const text=document.getElementById('stateBox').value || '{}'; importState(JSON.parse(text)); document.getElementById('message').textContent='Import OK'; document.getElementById('stateBox').value=JSON.stringify(exportState());}
window.getDefaultState=getDefaultState; window.validateState=validateState; window.migrateState=migrateState; window.exportState=exportState; window.importState=importState;
</script></body></html>
